services:
  portal:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - db_data:/app/data
    environment:
      # ── Required ─────────────────────────────────────────────────────────────
      DATABASE_URL: file:/app/data/prod.db
      ENCRYPTION_KEY: "change-me-to-a-random-32-char-string"
      JWT_SECRET: "change-me-to-another-random-secret"

      # ── GitHub integration ────────────────────────────────────────────────────
      GITHUB_TOKEN: ""
      # GITHUB_ORG: ""   # Optional — omit to create repos under your personal account

      # ── Admin seed (used on first boot) ──────────────────────────────────────
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "ChangeMe123!"
      ADMIN_NAME: "Portal Admin"

volumes:
  db_data:
